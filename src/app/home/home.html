<div class="home-container">
    @for (video of videos; track video.id) {
        <app-video-container 
        [url]="video.url" 
        [title]="video.title" 
        [buttonDestination]="video.buttonDestination"
        [style]="video.style"
        [width]="video.width"
        [height]="video.height"
        [subtitle]="video.subtitle"/>
    }
