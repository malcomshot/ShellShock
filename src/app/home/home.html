<div class="home-container">
    @for (video of videos; track video.id) {
        <div class="video-card">
            <h3>{{ video.title }}</h3>
            <p>{{ video.subtitle }}</p>
            <iframe 
                [width]="video.width" 
                [height]="video.height" 
                [src]="sanitizeUrl(video.url)" 
                [title]="video.title" 
                frameborder="0" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
            </iframe>
        </div>
    }
    <!-- <iframe width="560" height="315" src="https://www.youtube.com/embed/yQ7jmTXwqOo?si" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe> -->
</div>
